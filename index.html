<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>스윙 데일리 브리핑</title>
<style>
  :root{
    --bg:#0f1216; --card:#171c22; --card2:#1e242c; --line:#2a323c;
    --tx:#e8edf2; --sub:#9aa7b4; --accent:#4c8dff;
    --up:#ff5a5a; --down:#4d9bff; --flat:#9aa7b4;
  }
  @media (prefers-color-scheme:light){
    :root{ --bg:#f4f6f9; --card:#ffffff; --card2:#f0f3f7; --line:#e2e8f0;
      --tx:#1a2330; --sub:#5b6875; --accent:#2f6fe4; --up:#e23b3b; --down:#2f6fe4; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:18px 16px 60px}
  header{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:6px}
  h1{font-size:19px;margin:0;letter-spacing:-.02em}
  h1 .dot{color:var(--accent)}
  select{background:var(--card2);color:var(--tx);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-size:15px;font-family:inherit}
  .headline{background:linear-gradient(135deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:14px 0 20px;font-size:16px;font-weight:600}
  section{margin:22px 0}
  h2{font-size:13px;text-transform:none;color:var(--sub);font-weight:700;
    margin:0 0 10px;letter-spacing:.02em;display:flex;align-items:center;gap:7px}
  .ind{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
  .ind .c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .ind .n{font-size:12px;color:var(--sub)}
  .ind .v{font-size:18px;font-weight:700;margin-top:2px}
  .ind .d{font-size:12px;margin-top:1px}
  .news .c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:9px}
  .news .lab{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:3px}
  .hl{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:7px;overflow:hidden}
  .hl summary{cursor:pointer;padding:11px 14px;list-style:none;display:flex;gap:9px;align-items:flex-start;font-size:14px;line-height:1.45}
  .hl summary::-webkit-details-marker{display:none}
  .hl summary::after{content:'▾';color:var(--sub);margin-left:auto;flex:0 0 auto;font-size:11px}
  .hl[open] summary::after{content:'▴'}
  .hl .fg{flex:0 0 auto}
  .hl .ttl{flex:1;font-weight:600}
  .tag{flex:0 0 auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;border:1px solid var(--line);white-space:nowrap;margin-top:2px}
  .tag.구조{color:#ffb454;border-color:#ffb45455} .tag.일회성{color:var(--sub)}
  .hl .body{padding:0 14px 12px;font-size:13.5px;color:var(--sub);line-height:1.65;border-top:1px solid var(--line);padding-top:10px}
  .hl .why{color:var(--tx);margin-top:6px} .hl .why b{color:var(--accent)}
  .mgrp{font-size:13px;font-weight:700;color:var(--sub);margin:16px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .mgrp:first-of-type{margin-top:0}
  .hl .src{font-size:12px;color:var(--sub);margin-top:9px;padding-top:8px;border-top:1px dashed var(--line)}
  .hl .src b{color:var(--sub);font-weight:700;margin-right:4px}
  .hl .src a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
  .hl .src a:hover,.hl .src a:active{opacity:.75}
  .foldbox{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .foldbox>summary{cursor:pointer;list-style:none;padding:13px 16px;display:flex;align-items:baseline;gap:10px}
  .foldbox>summary::-webkit-details-marker{display:none}
  .foldbox>summary::after{content:'▾';color:var(--sub);margin-left:auto;font-size:12px}
  .foldbox[open]>summary::after{content:'▴'}
  .ftitle{font-size:14px;font-weight:700}
  .fprev{font-size:12px;color:var(--sub)}
  .fbody{padding:2px 14px 14px}
  .fbody .mkt:first-child{margin-top:4px}
  .fgrp{font-size:12px;font-weight:700;margin:12px 0 6px}
  .fgrp.in{color:var(--up)} .fgrp.out{color:var(--down)} .fgrp.mix{color:var(--sub)}
  .frow{display:grid;grid-template-columns:96px 62px 1fr;gap:8px;align-items:baseline;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:5px}
  .fsec{font-weight:700;font-size:14px}
  .fn{display:block;font-size:11px;color:var(--sub);font-weight:400;margin-top:1px}
  .fchg{font-weight:700;font-size:14px;text-align:right}
  .flead{font-size:13px;color:var(--sub)}
  .fnote{grid-column:1/-1;font-size:12px;color:var(--sub);margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600}
  .chip b{color:var(--accent)}
  .mkt{margin-top:14px}
  .mkt .flag{font-size:14px;font-weight:700;margin:14px 0 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
  .tier{flex:0 0 auto;font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--card2);border:1px solid var(--line);white-space:nowrap;margin-top:2px}
  .tier.대장{color:#ffb454} .tier.중형{color:#59d0a0} .tier.소형,.tier.신흥{color:#c08bff}
  .co .top{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline}
  .co .nm{font-weight:700;font-size:15px}
  .co .sec{font-size:12px;color:var(--sub)}
  .co .th{font-size:11px;color:var(--accent);border:1px solid var(--line);border-radius:6px;padding:0 6px}
  .co .chg{font-size:13px;font-weight:700}
  .co .cap{font-size:12px;color:var(--sub)}
  .co .desc{font-size:13px;color:var(--sub);margin-top:3px}
  .up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
  .topbox{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .topbox summary{cursor:pointer;padding:12px 16px;font-weight:600;list-style:none}
  .topbox summary::-webkit-details-marker{display:none}
  .topbox summary::after{content:' ▾';color:var(--sub)}
  .topbox[open] summary::after{content:' ▴'}
  .tlist{padding:0 12px 10px}
  .trow{display:grid;grid-template-columns:28px 1fr 90px 110px;gap:6px;padding:5px 4px;font-size:13px;border-top:1px solid var(--line);align-items:center}
  .trow.thead{color:var(--sub);font-size:11px;border-top:none}
  .trank{color:var(--sub)} .tchg{text-align:right} .tval{text-align:right;color:var(--sub)}
  .tsub{font-size:11px;color:var(--sub);margin-top:1px}
  .tdesc{font-size:12px;color:var(--tx);opacity:.78;margin-top:3px;line-height:1.45}
  .tname a{color:inherit;text-decoration:none;border-bottom:1px dashed var(--sub)}
  .tname a:hover,.tname a:active{opacity:.75}
  .trap a{color:inherit;text-decoration:none;border-bottom:1px dashed var(--sub)}
  .trap a:hover,.trap a:active{opacity:.75}
  .myview{background:var(--card);border:1px dashed var(--accent);border-radius:12px;padding:14px 16px;color:var(--sub);font-size:14px}
  .myview b{color:var(--tx)}
  footer{margin-top:34px;color:var(--sub);font-size:12px;text-align:center;border-top:1px solid var(--line);padding-top:16px}
  .err{padding:40px 10px;text-align:center;color:var(--sub)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot">●</span> 스윙 데일리 브리핑</h1>
    <select id="dateSel" aria-label="날짜 선택"></select>
  </header>
  <div id="app"><div class="err">불러오는 중…</div></div>
  <footer>learn-in-public 공부 기록 · 특정 종목 매수·매도 권유가 아님 · 숫자는 그날 자동수집 데이터 기준</footer>
</div>
<script>
const dirClass = s => s==='up'?'up':s==='down'?'down':'flat';
function chgClass(t){ if(!t) return 'flat';
  if(/상한|^\+|↑|급등/.test(t)) return 'up';
  if(/하한|^-|↓|급락/.test(t)) return 'down'; return 'flat'; }
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function coCard(c){
  return `<div class="card"><div class="tier ${c.tier}">${c.tier}</div>
   <div class="co"><div class="top">
     <span class="nm">${esc(c.name)}</span>
     <span class="sec">${esc(c.sector)}</span>
     ${c.theme?`<span class="th">${esc(c.theme)}</span>`:''}
     <span class="chg ${chgClass(c.change)}">${esc(c.change)}</span>
     <span class="cap">· 시총 ${esc(c.cap)}</span>
   </div><div class="desc">${esc(c.desc)}</div></div></div>`;
}
function render(d){
  const ind = d.indicators.map(i=>`<div class="c"><div class="n">${esc(i.name)}</div>
     <div class="v">${esc(i.value)}</div><div class="d ${dirClass(i.dir)}">${esc(i.change)}</div></div>`).join('');
  const flowChips = m => (d.flow[m]||[]).map((s,idx)=>`<span class="chip"><b>${idx+1}</b> ${esc(s)}</span>`).join('');
  const isObj = v => v && typeof v==='object' && !Array.isArray(v);
  const fold = (title, preview, inner) => `<section><details class="foldbox"><summary><span class="ftitle">${title}</span>${preview?`<span class="fprev">${esc(preview)}</span>`:''}</summary><div class="fbody">${inner}</div></details></section>`;
  const fRow = s => `<div class="frow"><span class="fsec">${esc(s.sector)}${s.n?`<span class="fn">${s.n}종목</span>`:''}</span><span class="fchg ${(+s.change>0)?'up':(+s.change<0)?'down':'flat'}">${(+s.change>0?'+':'')}${(+s.change).toFixed(1)}%</span><span class="flead">${esc(s.leader||'')}</span>${s.note?`<span class="fnote">${esc(s.note)}</span>`:''}</div>`;
  const flowBox = m => {const f=d.flow[m];
    if(!isObj(f)) return `<div class="chips">${flowChips(m)}</div>`;
    const iN=(f.in||[]).length, oN=(f.out||[]).length;
    return `${iN?`<div class="fgrp in">🔥 돈이 들어온 곳</div>${(f.in||[]).map(fRow).join('')}`:''}${oN?`<div class="fgrp out">💧 돈이 빠진 곳</div>${(f.out||[]).map(fRow).join('')}`:''}${f.mixed&&f.mixed.length?`<div class="fgrp mix">↔ 방향이 갈린 곳</div>${f.mixed.map(fRow).join('')}`:''}`;};
  const study = m => (d.study[m]||[]).map(coCard).join('');
  const mv = d.myview && d.myview.trim();
  const av = d.aiview && d.aiview.trim();
  const ic = d.indicomment && d.indicomment.trim();
  const topRow = (t,i)=>{const c=+t.change;const cls=c>0?'up':c<0?'down':'flat';const ar=c>0?'▲':c<0?'▼':'—';
    const sub=((t.sector||t.cap)?`<div class="tsub">${esc(t.sector||'')}${t.sector&&t.cap?' · ':''}${t.cap?esc('시총 '+t.cap):''}</div>`:'')
      +(t.desc?`<div class="tdesc">${esc(t.desc)}</div>`:'');
    const nm=t.tv?`<a href="${t.tv}" target="_blank" rel="noopener">${esc(t.name)} 📈</a>`:esc(t.name);
    return `<div class="trow"><span class="trank">${i+1}</span><span class="tname">${nm}${sub}</span><span class="tchg ${cls}">${ar} ${Math.abs(c).toFixed(2)}%</span><span class="tval">${esc(t.value)}</span></div>`;};
  const topList = m => (d.top&&d.top[m]||[]).map(topRow).join('');
  const FG={kr:'🇰🇷',us:'🇺🇸',macro:'🌍'};
  const srcRow = s => (s&&s.length)?`<div class="src"><b>출처</b> ${s.map(x=>x.url?`<a href="${x.url}" target="_blank" rel="noopener">${esc(x.name||x.url)}</a>`:esc(x.name||x)).join(' · ')}</div>`:'';
  const hlRow = n => `<details class="hl"><summary><span class="fg">${FG[n.market]||'📰'}</span><span class="ttl">${esc(n.title)}</span>${n.type?`<span class="tag ${esc(n.type)}">${esc(n.type)}</span>`:''}</summary><div class="body">${esc(n.summary).replace(/\n/g,'<br>')}${n.why?`<div class="why"><b>왜 중요</b> — ${esc(n.why)}</div>`:''}${n.tickers&&n.tickers.length?`<div class="why"><b>관련</b> — ${esc(n.tickers.join(', '))}</div>`:''}${srcRow(n.sources)}</div></details>`;
  const MKT=[['us','🇺🇸 미국'],['macro','🌍 거시'],['kr','🇰🇷 한국']];
  const hs = d.headlines||[];
  const nPrev = hs.length ? `${hs.length}건 · 구조 ${hs.filter(n=>n.type==='구조').length} · 일회성 ${hs.filter(n=>n.type==='일회성').length}` : '';
  const newsSec = hs.length
    ? fold('📰 오늘 무슨 일', nPrev, `<div class="news">${
        MKT.map(([k,lab])=>{const rows=hs.filter(n=>n.market===k);
          return rows.length?`<div class="mgrp">${lab}</div>${rows.map(hlRow).join('')}`:'';}).join('')
      }</div>`)
    : fold('📰 오늘 무슨 일', '', `<div class="news">
     <div class="c"><div class="lab">🇺🇸 미국</div>${esc(d.news.us)}</div>
     <div class="c"><div class="lab">🇰🇷 한국</div>${esc(d.news.kr)}</div>
     <div class="c"><div class="lab">🌍 거시</div>${esc(d.news.macro)}</div></div>`);
  const fc = m => {const f=d.flow&&d.flow[m]; return isObj(f)?((f.in||[]).length+(f.out||[]).length+(f.mixed||[]).length):0;};
  const flowCount = (()=>{const f=d.flow&&d.flow.us; if(!isObj(f)) return '';
    const ins=(d.flow.us.in||[]).length+(d.flow.kr.in||[]).length, outs=(d.flow.us.out||[]).length+(d.flow.kr.out||[]).length;
    return `들어옴 ${ins} · 빠짐 ${outs}`;})();
  const trapSec = d.trap ? `
   <section><h2>🪤 오늘 봐야 될 차트</h2><div class="myview trap" style="border-style:solid">${
     d.trap.length ? d.trap.map(t=>`<div style="margin:3px 0">${t.tv?`<a href="${t.tv}" target="_blank" rel="noopener"><b>${esc(t.name)}</b> 📈</a>`:`<b>${esc(t.name)}</b>`} <span style="color:var(--sub)">(${esc(t.market)} ${esc(t.sector)})</span> — ${esc(t.verdict)}${t.detail?`<div class="tsub">${esc(t.detail)}</div>`:''}</div>`).join('')
     : ''}${(()=>{const i=d.trapinfo||{};if(!i)return '';
        const sc=i['스캔수']||{};const tot=Object.values(sc).reduce((a,b)=>a+b,0);
        const row=n=>`<div style="margin:3px 0">· ${n.tv?`<a href="${n.tv}" target="_blank" rel="noopener"><b>${esc(n.name)}</b> 📈</a>`:`<b>${esc(n.name)}</b>`} <span style="color:var(--sub)">거래량 ${n.volx}배 · RSI ${n.rsi}</span></div>`;
        const rl=(i['RSI낮은순']||[]).map(row).join('');
        const vh=(i['거래량큰순']||[]).map(row).join('');
        const head=(d.trap&&d.trap.length)?'':`<b>오늘 살 자리 없음 — 대기</b>`;
        return head+`<div class="tsub" style="margin-top:6px">`
          + (tot?`스캔 ${tot}종목(${Object.entries(sc).map(([k,v])=>k+' '+v).join(' · ')}) · 통과 ${i['통과']||0}`:'')
          + (i['기준']?`<br>기준: ${esc(i['기준'])}`:'')+`</div>`
          + (rl?`<div class="tsub" style="margin-top:8px"><b>👀 RSI 낮은 순 (과매도 쪽)</b>${rl}</div>`:'')
          + (vh?`<div class="tsub" style="margin-top:8px"><b>🔥 거래량 큰 순 (변화 일어나는 곳)</b>${vh}</div>`:'')
          + `<div class="tsub" style="margin-top:6px;opacity:.75">※ 통과는 아니지만 차트 볼 후보 — 전저점·이평·지지 판단은 내가</div>`;})()}</div></section>`:'';
  const thead = `<div class="trow thead"><span class="trank">#</span><span class="tname">종목</span><span class="tchg">등락</span><span class="tval">거래대금</span></div>`;
  const topSec = (d.top&&(d.top.kr||[]).length)
    ? fold(`💰 거래대금 TOP${(d.top.kr||[]).length}`, '개별기업 · ETF 제외',
        `<details class="topbox"><summary>🇰🇷 한국</summary><div class="tlist">${thead}${topList('kr')}</div></details>
         <details class="topbox"><summary>🇺🇸 미국</summary><div class="tlist">${thead}${topList('us')}</div></details>`)
    : '';
  document.getElementById('app').innerHTML = `
   <div class="headline">⚡ ${esc(d.headline)}</div>
   <section><h2>🌡️ 지표 한눈에</h2><div class="ind">${ind}</div>
     ${ic?`<div class="myview" style="margin-top:10px;border-style:solid"><b>🤖 지표 읽기</b> — ${esc(d.indicomment).replace(/\n/g,'<br>')}</div>`:''}</section>
   ${newsSec}
   ${fold('💰 돈이 어디로 (주도 섹터)', flowCount, `
     <div class="mkt"><div class="flag">🇺🇸 미국</div>${flowBox('us')}</div>
     <div class="mkt"><div class="flag">🇰🇷 한국</div>${flowBox('kr')}</div>`)}
   ${trapSec}
   ${topSec}
   ${fold('✍️ 내 판단 · AI 한줄', mv?'작성됨':'아직 비어있음', `
     <div class="myview">${mv?esc(d.myview).replace(/\n/g,'<br>'):'<b>여기는 네가 채우는 칸.</b> 위 뉴스·지표·섹터를 다 보고 "나는 이렇게 본다"를 적는 곳. (아직 비어있음)'}</div>
     ${av?`<div class="myview" style="margin-top:8px;border-style:solid"><b>🤖 AI 한줄</b> — ${esc(d.aiview).replace(/\n/g,'<br>')}</div>`:''}`)}`;
}
async function load(date){
  try{
    const r = await fetch(`data/${date}.json?v=`+Date.now());
    render(await r.json());
    window.scrollTo(0,0);
  }catch(e){ document.getElementById('app').innerHTML='<div class="err">'+date+' 데이터를 못 불러왔어.</div>'; }
}
(async function(){
  try{
    const dates = await (await fetch('data/index.json?v='+Date.now())).json();
    const sel = document.getElementById('dateSel');
    sel.innerHTML = dates.map(d=>`<option value="${d}">${d}</option>`).join('');
    sel.onchange = ()=>load(sel.value);
    if(dates.length) load(dates[0]);
    else document.getElementById('app').innerHTML='<div class="err">아직 브리핑이 없어.</div>';
  }catch(e){ document.getElementById('app').innerHTML='<div class="err">목록을 못 불러왔어.</div>'; }
})();
</script>
</body>
</html>
